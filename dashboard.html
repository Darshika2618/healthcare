<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Medicines Database</title>
  <style>
    body {
      font-family: Arial;
      margin: 20px;
    }
    input {
      margin: 5px;
      padding: 8px;
    }
    button {
      padding: 8px 12px;
      cursor: pointer;
    }
    .box {
      margin-top: 20px;
    }
    .item {
      padding: 10px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <h2>Medicine Entry</h2>

  <input type="text" id="name" placeholder="Medicine Name" />
  <input type="number" id="price" placeholder="Price" />
  <button onclick="addMedicine()">Add Medicine</button>

  <div class="box">
    <h3>Medicine List</h3>
    <div id="list"></div>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      push,
      onValue
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // 🔴 YOUR FIREBASE CONFIG (make sure this is correct)
    const firebaseConfig = {
      databaseURL: "https://medicare-hub-ee089-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ✅ ADD MEDICINE (AUTO ID)
    window.addMedicine = function () {
      const name = document.getElementById("name").value;
      const price = document.getElementById("price").value;

      if (!name || !price) {
        alert("Fill all fields");
        return;
      }

      push(ref(db, "medicines"), {
        name: name,
        price: price
      })
      .then(() => {
        console.log("Medicine added");
        document.getElementById("name").value = "";
        document.getElementById("price").value = "";
      })
      .catch((err) => {
        console.error("Error:", err);
      });
    };

    // ✅ READ / DISPLAY DATA
    const listDiv = document.getElementById("list");

    onValue(ref(db, "medicines"), (snapshot) => {
      listDiv.innerHTML = "";

      snapshot.forEach((child) => {
        const data = child.val();

        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
          <b>Name:</b> ${data.name} <br/>
          <b>Price:</b> ${data.price}
        `;

        listDiv.appendChild(div);
      });
    });

  </script>

</body>
</html>
