<!DOCTYPE html>
<html>
<head>
  <title>Medicare Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
    }

    .container {
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
    }

    input {
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 8px 12px;
      background: #00c6ff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    ul {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Healthcare Dashboard</h1>

  <!-- Medicine -->
  <div class="card">
    <h2>Medicine Timetable</h2>
    <input id="medName" placeholder="Medicine Name">
    <input id="medTime" type="time">
    <button onclick="addMedicine()">Add</button>
    <ul id="medList"></ul>
  </div>

  <!-- Appointment -->
  <div class="card">
    <h2>Appointments</h2>
    <input id="docName" placeholder="Doctor Name">
    <input id="appDate" type="date">
    <button onclick="addAppointment()">Add</button>
    <ul id="appList"></ul>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDQqVTAUDrJWkzMVegjerPANHANSLQ7ESw",
    authDomain: "medicare-hub-ee089.firebaseapp.com",
    databaseURL: "https://medicare-hub-ee089-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "medicare-hub-ee089",
    storageBucket: "medicare-hub-ee089.appspot.com",
    messagingSenderId: "825503472209",
    appId: "1:825503472209:web:9567f5ed4f947461e0b670"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Add Medicine
  window.addMedicine = function() {
    const name = document.getElementById("medName").value;
    const time = document.getElementById("medTime").value;

    if (!name || !time) return alert("Fill all fields");

    push(ref(db, "medicines"), {
      name: name,
      time: time
    });
  };

  // Load Medicines
  onValue(ref(db, "medicines"), snapshot => {
    const data = snapshot.val() || {};
    const list = document.getElementById("medList");
    list.innerHTML = "";

    Object.values(data).forEach(m => {
      list.innerHTML += `<li>${m.name} - ${m.time}</li>`;
    });
  });

  // Add Appointment
  window.addAppointment = function() {
    const doc = document.getElementById("docName").value;
    const date = document.getElementById("appDate").value;

    if (!doc || !date) return alert("Fill all fields");

    push(ref(db, "appointments"), {
      doctor: doc,
      date: date
    });
  };

  // Load Appointments
  onValue(ref(db, "appointments"), snapshot => {
    const data = snapshot.val() || {};
    const list = document.getElementById("appList");
    list.innerHTML = "";

    Object.values(data).forEach(a => {
      list.innerHTML += `<li>${a.doctor} - ${a.date}</li>`;
    });
  });

</script>

</body>
</html>
