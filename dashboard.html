<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Medicare Hub</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
    }

    .container {
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
    }

    input {
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 8px 12px;
      background: #00c6ff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    ul {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Healthcare Dashboard</h1>

  <!-- Medicine Section -->
  <div class="card">
    <h2>Medicine Timetable</h2>
    <input id="medName" placeholder="Medicine Name">
    <input id="medTime" type="time">
    <button onclick="addMedicine()">Add</button>
    <ul id="medList"></ul>
  </div>

  <!-- Appointment Section -->
  <div class="card">
    <h2>Appointments</h2>
    <input id="docName" placeholder="Doctor Name">
    <input id="appDate" type="date">
    <button onclick="addAppointment()">Add</button>
    <ul id="appList"></ul>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "PASTE_YOUR_API_KEY",
  authDomain: "PASTE_YOUR_AUTH_DOMAIN",
  databaseURL: "PASTE_YOUR_DB_URL",
  projectId: "PASTE_YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// 🔹 Add Medicine
function addMedicine() {
  const name = medName.value;
  const time = medTime.value;

  if (!name || !time) return alert("Fill all fields");

  db.ref("medicines").push({
    name: name,
    time: time
  });

  medName.value = "";
  medTime.value = "";
}


// 🔹 Load Medicines
db.ref("medicines").on("value", snapshot => {
  let data = snapshot.val();
  medList.innerHTML = "";

  for (let id in data) {
    let m = data[id];
    medList.innerHTML += `<li>${m.name} - ${m.time}</li>`;
  }
});


// 🔹 Add Appointment
function addAppointment() {
  const doc = docName.value;
  const date = appDate.value;

  if (!doc || !date) return alert("Fill all fields");

  db.ref("appointments").push({
    doctor: doc,
    date: date
  });

  docName.value = "";
  appDate.value = "";
}


// 🔹 Load Appointments
db.ref("appointments").on("value", snapshot => {
  let data = snapshot.val();
  appList.innerHTML = "";

  for (let id in data) {
    let a = data[id];
    appList.innerHTML += `<li>${a.doctor} - ${a.date}</li>`;
  }
});

</script>

</body>
</html>
