<!DOCTYPE html>
<html>
<head>
<title>Prescriptions</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="layout">

<div class="sidebar">
  <h2>Medicare</h2>
  <a href="index.html">Home</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="prescription.html">Prescriptions</a>
</div>

<div class="main">
  <h1>Prescriptions</h1>

  <div class="card">
    <textarea id="text" placeholder="Write prescription..."></textarea><br>
    <button onclick="save()">Save</button>
    <ul id="list"></ul>
  </div>

</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("pres")) || [];

function render() {
  list.innerHTML = data.map(d => `<li>${d}</li>`).join("");
}

function save() {
  if (!text.value) return;
  data.push(text.value);
  localStorage.setItem("pres", JSON.stringify(data));
  render();
}

render();
</script>

</body>
</html>
